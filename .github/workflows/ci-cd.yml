name: CI/CD

on:
  push:
    branches: [main]

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        run: pip install uv
        
      - name: Sync dependencies
        run: uv sync --frozen

      - name: Lint with ruff
        run: uv run ruff check .

      - name: Run tests
        # We dummy out the API keys for tests
        env:
            GEMINI_API_KEY: "dummy"
            GROQ_API_KEY: "dummy"
        run: uv run pytest

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCP
        run: gcloud auth configure-docker gcr.io

      - name: Build and Push Docker image
        run: gcloud builds submit --tag gcr.io/${{ secrets.PROJECT_ID }}/support-gateway

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy support-gateway \
            --image gcr.io/${{ secrets.PROJECT_ID }}/support-gateway \
            --region us-central1 \
            --allow-unauthenticated \
            --min-instances 0 \
            --max-instances 4 \
            --concurrency 20 \
            --memory 2Gi \
            --cpu 1 \
            --timeout 120s \
            --cpu-boost \
            --set-env-vars DATABASE_URL=${{ secrets.DATABASE_URL }},GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }},GROQ_API_KEY=${{ secrets.GROQ_API_KEY }},PINECONE_API_KEY=${{ secrets.PINECONE_API_KEY }},PINECONE_ENV=${{ secrets.PINECONE_ENV }}
